name: Publicar acervo no GitHub Pages

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    runs-on: ubuntu-latest

    steps:
      - name: Baixar repositório
        uses: actions/checkout@v4

      - name: Preparar Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Gerar catálogo das revistas
        run: node scripts/generate-manifest.mjs

      - name: Configurar GitHub Pages
        uses: actions/configure-pages@v5

      - name: Preparar arquivos para publicação
        uses: actions/upload-pages-artifact@v3
        with:
          path: "."

      - name: Publicar site
        id: deployment
        uses: actions/deploy-pages@v4
