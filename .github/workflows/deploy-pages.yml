name: Publicar acervo no GitHub Pages

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    runs-on: ubuntu-latest

    steps:
      - name: Baixar repositório
        uses: actions/checkout@v4

      - name: Preparar Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Instalar conversor de PDF
        run: |
          sudo apt-get update
          sudo apt-get install -y poppler-utils

      - name: Converter PDFs em páginas
        run: node scripts/generate-pages.mjs

      - name: Gerar catálogo
        run: node scripts/generate-manifest.mjs

      - name: Montar site
        run: |
          mkdir -p _site
          cp -R index.html assets data revistas _site/
          touch _site/.nojekyll

      - name: Configurar GitHub Pages
        uses: actions/configure-pages@v5

      - name: Preparar publicação
        uses: actions/upload-pages-artifact@v3
        with:
          path: "_site"

      - name: Publicar site
        id: deployment
        uses: actions/deploy-pages@v4
